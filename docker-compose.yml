services:
  pi-backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${PI_BACKEND_PORT:-3000}:3000"
    restart: unless-stopped
    init: true
    environment:
      SEARXNG_URL: http://searxng:8080
      BROWSE_SERVICE_URL: http://pi-browse-service:8001
      BROWSE_TIMEOUT_MS: ${BROWSE_TIMEOUT_MS:-90000}
    depends_on:
      searxng:
        condition: service_healthy
      pi-browse-service:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ./.runtime-data:/app/.runtime-data

  pi-browse-service:
    build:
      context: ./services/browse-service
    restart: unless-stopped
    init: true
    ports:
      - "127.0.0.1:8001:8001"
    environment:
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      BROWSE_LLM_MODEL: ${BROWSE_LLM_MODEL:-openrouter/google/gemini-3.1-flash-lite-preview}
      BROWSE_PAGE_TIMEOUT_MS: ${BROWSE_PAGE_TIMEOUT_MS:-60000}
      BROWSE_WAIT_FOR_TIMEOUT_MS: ${BROWSE_WAIT_FOR_TIMEOUT_MS:-10000}
      BROWSE_OFFICIAL_SKILL_MAX_CHARS: ${BROWSE_OFFICIAL_SKILL_MAX_CHARS:-2500}
      BROWSE_OFFICIAL_SKILL_TOTAL_MAX_CHARS: ${BROWSE_OFFICIAL_SKILL_TOTAL_MAX_CHARS:-5000}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 15s
      timeout: 5s
      start_period: 90s
      retries: 5

  searxng:
    image: searxng/searxng:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./services/searxng:/etc/searxng:ro
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5

  engram:
    image: ghcr.io/gentleman-programming/engram:latest
    ports:
      - "7437:7437"
    volumes:
      - engram-data:/root/.engram
    restart: unless-stopped

volumes:
  engram-data:
